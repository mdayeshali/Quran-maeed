<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic Light - নামাজের সময়</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HERO -->
<section class="hero">
    <h2>🕌 নামাজের সময়</h2>
    <p id="hijriDate">লোড হচ্ছে...</p>
</section>

<div class="container">

    <!-- 🔥 NEXT PRAYER CARD -->
    <div class="card center" id="nextPrayerCard">
        <h3>🕌 নামাজ আপডেট</h3>

        <p id="currentPrayer">লোড হচ্ছে...</p>
        <p id="nextPrayer"></p>

        <p id="countdown"></p>
    </div>

    <!-- LOCATION -->
    <div class="card center">
        <h3>📍 আপনার লোকেশন</h3>
        <p id="locationText">লোড হচ্ছে...</p>
    </div>

    <!-- FULL PRAYER LIST -->
    <div class="card">
        <h3>🕒 আজকের নামাজের সময়</h3>
        <div id="prayerList">
            <p style="text-align:center;">লোড হচ্ছে...</p>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
