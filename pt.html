<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic Light - নামাজের সময়</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">

<section class="hero">

<div class="container">

        <h3>📍 আপনার লোকেশন</h3>
        <p id="locationText">লোকেশন পাওয়া যায়নি</p>
        <button onclick="getUserGPS()">📡 অটো লোকেশন চালু করুন</button>
    </div>

    <!-- Prayer Times -->
    <div class="card">
        <h3>🕒 নামাজের সময়</h3>
        <div id="prayerList">
            <p style="text-align:center;">লোকেশন চালু করুন</p>
        </div>
    </div>

</div>

<script src="script.js"></script>

</html>
